name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish-sdk:
    name: Publish SDK to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build SDK
        run: npm run build --workspace=packages/sdk

      - name: Publish
        run: npm publish --workspace=packages/sdk --provenance --access public

  publish-image:
    name: Publish sandbox-server image to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build sandbox-server
        run: npm run build --workspace=packages/sandbox-server

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: packages/sandbox-server
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ecs-sandbox:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ecs-sandbox:${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
